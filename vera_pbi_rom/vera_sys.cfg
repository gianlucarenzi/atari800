FEATURES {
    STARTADDRESS: default = $8000;
}
SYMBOLS {
    __EXEHDR__:       type = import;
    __SYSTEM_CHECK__: type = import;
    __AUTOSTART__:    type = import;
    __STACKSIZE__:    type = weak, value = $0800;
    __STARTADDRESS__: type = export, value = %S;
}
MEMORY {
    ZP:          file = "", define = yes, start = $0082,                size = $007E;
    HEADER:      file = %O,               start = $0000,                size = $0002;
    SYSCHKHDR:   file = %O,               start = $0000,                size = $0004;
    SYSCHKCHNK:  file = %O,               start = $2E00,                size = $0300;
    SYSCHKTRL:   file = %O,               start = $0000,                size = $0006;
    SRPREPHDR:   file = %O,               start = $0000,                size = $0004;
    CTLBLK:      file = "", define = yes, start = %S,                   size = $000C;
    SRPREPCHNK:  file = %O, define = yes, start = %S + $000C,           size = $7C20 - %S - $07FF - $000C;
    SRPREPTRL:   file = %O,               start = $0000,                size = $0006;
    MAINHDR:     file = %O,               start = $0000,                size = $0004;
    MAIN:        file = %O, define = yes, start = %S + $000C + __LOWBSS_SIZE__, size = $D000 - __STACKSIZE__ - %S - __LOWBSS_SIZE__ - $000C;
    TRAILER:     file = %O,               start = $0000,                size = $000C;
    HIDDEN_RAM2: file = "", define = yes, start = $D800,                size = $0800;
    CHARGEN:     file = "", define = yes, start = $E000,                size = $0400;
    HIDDEN_RAM:  file = "", define = yes, start = $E400,                size = $FFFA - $E400;
}
SEGMENTS {
    ZEROPAGE:    load = ZP,                            type = zp;
    EXTZP:       load = ZP,                            type = zp,                optional = yes;
    EXEHDR:      load = HEADER,                        type = ro;
    SYSCHKHDR:   load = SYSCHKHDR,                     type = ro,                optional = yes;
    SYSCHK:      load = SYSCHKCHNK,                    type = rw,  define = yes, optional = yes;
    SYSCHKTRL:   load = SYSCHKTRL,                     type = ro,                optional = yes;
    SRPREPHDR:   load = SRPREPHDR,                     type = ro;
    VERACTL:     load = CTLBLK,                        type = bss, define = yes;
    LOWBSS:      load = SRPREPCHNK,                    type = bss, define = yes;
    SRPREP:      load = SRPREPCHNK,                    type = rw,  define = yes;
    SHADOW_RAM:  load = SRPREPCHNK, run = HIDDEN_RAM,  type = rw,  define = yes, optional = yes;
    SHADOW_RAM2: load = SRPREPCHNK, run = HIDDEN_RAM2, type = rw,  define = yes, optional = yes;
    SRPREPTRL:   load = SRPREPTRL,                     type = ro;
    MAINHDR:     load = MAINHDR,                       type = ro;
    STARTUP:     load = MAIN,                          type = ro,  define = yes;
    LOWCODE:     load = MAIN,                          type = ro,  define = yes, optional = yes;
    ONCE:        load = MAIN,                          type = ro,                optional = yes;
    CODE:        load = MAIN,                          type = ro,  define = yes;
    RODATA:      load = MAIN,                          type = ro;
    DATA:        load = MAIN,                          type = rw;
    INIT:        load = MAIN,                          type = rw,                optional = yes;
    BSS:         load = MAIN,                          type = bss, define = yes;
    AUTOINIT:    load = TRAILER,                       type = ro,                optional = yes;
    AUTOSTRT:    load = TRAILER,                       type = ro;
}
FEATURES {
    CONDES: type    = constructor,
            label   = __CONSTRUCTOR_TABLE__,
            count   = __CONSTRUCTOR_COUNT__,
            segment = ONCE;
    CONDES: type    = destructor,
            label   = __DESTRUCTOR_TABLE__,
            count   = __DESTRUCTOR_COUNT__,
            segment = RODATA;
    CONDES: type    = interruptor,
            label   = __INTERRUPTOR_TABLE__,
            count   = __INTERRUPTOR_COUNT__,
            segment = RODATA,
            import  = __CALLIRQ__;
}
