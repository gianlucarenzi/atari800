# ld65 linker configuration for VERA.SYS body (relocatable).
#
# Produces a flat binary built nominally at $A000. The body is relocated to
# current MEMLO at install time by the bootstrap loader; all internal absolute
# pointers are patched via a fixup table generated from a build-twice diff.
#
# Layout (offset 0 is start of body):
#   EXPORTS  : 18 bytes — pointer table consumed by the bootstrap loader
#   CODE     : driver + VBI + hooks
#   RODATA   : font (1 KB)
#   DATA     : 3 initialized bytes
#   LOWBSS   : 53 bytes uninitialized (saved vectors, cursor state)
#   VCTL     : 16 bytes uninitialized (signature + ptrs, filled by bootstrap)
#
# LOWBSS and VCTL are BSS and produce no file bytes; they live above the file
# image and are reserved by the bootstrap's MEMLO bump.

FEATURES {
    STARTADDRESS: default = $A000;
}

SYMBOLS {
    __STARTADDRESS__: type = export, value = %S;
}

MEMORY {
    BODY: file = %O, define = yes, start = %S, size = $1D00;
}

SEGMENTS {
    EXPORTS: load = BODY, type = ro,  define = yes;
    CODE:    load = BODY, type = ro,  define = yes;
    RODATA:  load = BODY, type = ro,  define = yes;
    DATA:    load = BODY, type = rw,  define = yes;
    LOWBSS:  load = BODY, type = bss, define = yes;
    VCTL:    load = BODY, type = bss, define = yes;
}
