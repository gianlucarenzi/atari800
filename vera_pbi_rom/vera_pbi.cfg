# ld65 linker configuration for the VeraX16 PBI ROM handler
# ROM is placed at $D800, size exactly 2 KB ($0800 bytes).
# Unused space is filled with $FF (erased EPROM/Flash value).

MEMORY {
    ROM: start = $D800, size = $0800, fill = yes, fillval = $FF, file = %O;
}

SEGMENTS {
    CODE:   load = ROM, type = ro, optional = no;
    RODATA: load = ROM, type = ro, optional = yes;
    DATA:   load = ROM, type = rw, optional = yes;
}
