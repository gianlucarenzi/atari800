# ld65 config for the one-shot bootstrap loader.
# Lives at fixed $5000 (outside any destination range — MEMLO is always
# < $4000 on standard Atari systems, so the body copy never overwrites
# the loader).

MEMORY {
    LOADER: file = %O, start = $5800, size = $0400;
}

SEGMENTS {
    CODE: load = LOADER, type = ro;
}
